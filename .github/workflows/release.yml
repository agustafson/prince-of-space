name: Release

# Triggered manually. Infers the next version with Nyx (git tags + conventional commits),
# or an optional manual override. Passes version to Gradle via
# ORG_GRADLE_PROJECT_version, then builds and signs all
# artifacts, builds CLI / IntelliJ / VS Code assets, uploads to
# Sonatype Central Portal (Maven), then creates a git tag and a
# GitHub Release. IDE packaging runs before Central upload so a
# failed VS Code or IntelliJ build never leaves Maven partially published.
# Dry run still builds CLI / IntelliJ / VS Code and prints extracted release
# notes; only Sonatype upload, Maven publish, tag, and GitHub Release are skipped.
#
# Required secrets (configure in Settings → Secrets → Actions):
#   SONATYPE_CENTRAL_TOKEN  — Bearer token from central.sonatype.com → User Token
#   GPG_PRIVATE_KEY         — Armored GPG private key (gpg --armor --export-secret-keys KEY_ID)
#   GPG_PASSPHRASE          — Passphrase for the GPG key
#
# See RELEASING.md for the full release checklist and how to set up these secrets.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — full build + IDE packaging + release notes in log; no Sonatype/Maven/tag/GitHub Release"
        required: false
        type: boolean
        default: false
      release_version:
        description: "Override release version (e.g. 0.2.0). Leave empty to infer from tags + commits."
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  # Pre-release gate: full 9-config eval per external corpus (matrix = parallel runners).
  # Blocks the publish job via `needs:` below. Hard-fails on any parse error or
  # idempotency failure (RealWorldEvalTest assertions). Runs on dry-run and full release alike.
  external-eval:
    name: External eval (${{ matrix.corpus }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - corpus: spring-framework
            repository: spring-projects/spring-framework
          - corpus: guava
            repository: google/guava
    steps:
      - name: Checkout Prince of Space
        uses: actions/checkout@v6

      - name: Checkout ${{ matrix.corpus }}
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repository }}
          path: external/${{ matrix.corpus }}
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v6

      - name: Run eval (full matrix — must pass for release)
        env:
          PRINCE_EVAL_ROOTS: ${{ github.workspace }}/external/${{ matrix.corpus }}
          PRINCE_EVAL_REPORT_SLUG: ${{ matrix.corpus }}
          PRINCE_EVAL_MAX_HEAP: 6g
          PRINCE_EVAL_MAX_OVER_LONG_SAMPLES: "0"
        run: ./gradlew :core:evalTest --no-configuration-cache --no-daemon

      - name: Upload eval report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-eval-report-${{ matrix.corpus }}-${{ github.sha }}
          path: docs/eval-results/*.md
          if-no-files-found: ignore

  release:
    needs: external-eval
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags for Nyx version inference.
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v6

      - name: Configure git identity for tagging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Use named branch at current ref (clearer git state for tagging later)
        run: git checkout -B "${GITHUB_REF_NAME}"

      - name: Infer next release version with Nyx
        if: ${{ inputs.release_version == '' }}
        id: nyx
        uses: mooltiverse/nyx@3.1.7
        with:
          command: infer
          configurationFile: .nyx.yml

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.release_version }}" ]]; then
            VERSION="${{ inputs.release_version }}"
            echo "Using workflow input override: ${VERSION}" >&2
          else
            VERSION="${{ steps.nyx.outputs.version }}"
            echo "Using Nyx inferred version: ${VERSION}" >&2
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version and export for Gradle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ -z "$VERSION" || "$VERSION" == *"SNAPSHOT"* ]]; then
            echo "::error::Version '$VERSION' is not valid for release."
            exit 1
          fi
          LAST_TAG="$(git tag -l 'v*' | sort -V | tail -n1)"
          if [[ -n "$LAST_TAG" ]]; then
            LAST_VER="${LAST_TAG#v}"
            if [[ "$VERSION" == "$LAST_VER" ]]; then
              echo "::error::Version '$VERSION' equals latest tag '$LAST_TAG'. Nothing new to release," \
                   "or use workflow input release_version to override."
              exit 1
            fi
          fi
          echo "ORG_GRADLE_PROJECT_version=$VERSION" >> "$GITHUB_ENV"
          echo "Releasing: $VERSION"

      - name: Generate changelog with Nyx
        uses: mooltiverse/nyx@3.1.7
        with:
          command: make
          configurationFile: .nyx.yml

      - name: Extract release notes from changelog
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          NOTES_FILE="$GITHUB_WORKSPACE/build/release-notes.md"
          mkdir -p "$GITHUB_WORKSPACE/build"
          awk -v version="$RELEASE_VERSION" '
            BEGIN {
              capture = 0
              inUnreleased = 0
            }
            /^## \[Unreleased\]/ {
              inUnreleased = 1
            }
            /^## \[(v)?[0-9]+\.[0-9]+\.[0-9]+\]/ {
              inUnreleased = 0
            }
            {
              if ($0 ~ ("^## \\[(v)?" version "\\]")) {
                capture = 1
              } else if (capture && $0 ~ /^## /) {
                exit
              }
              if (capture) {
                print
              }
            }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [[ ! -s "$NOTES_FILE" ]]; then
            echo "::warning::Could not extract section for ${RELEASE_VERSION}; using full changelog as release notes."
            cp CHANGELOG.md "$NOTES_FILE"
          fi

          echo "::group::Release notes for ${RELEASE_VERSION} (GitHub Release body)"
          cat "$NOTES_FILE"
          echo "::endgroup::"
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "Dry run: Sonatype upload, tag, and GitHub Release are skipped; notes above are what a full release would publish."
          fi

      - name: Run full test suite
        run: ./gradlew :core:test :spotless:test :core-bundled:test

      # Build + sign all three publishable modules and collect into build/staging-deploy/.
      - name: Build and sign publishable artifacts
        run: |
          ./gradlew \
            :core:build :spotless:build :core-bundled:build -x test \
            publishAllPublicationsToStagingRepository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # Fail before any Sonatype/Maven step if IDE packaging breaks (avoids a published Maven
      # coordinate with no matching GitHub Release assets).
      - name: Build CLI shadow JAR and IntelliJ plugin distribution
        run: ./gradlew :cli:shadowJar :intellij-plugin:buildPlugin --no-daemon

      - name: Set up Node (VS Code extension)
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: modules/vscode-extension/package-lock.json

      - name: Package VS Code extension (.vsix)
        working-directory: modules/vscode-extension
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          npm ci
          npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
          npm run compile
          npx --yes @vscode/vsce@3 package --out "$GITHUB_WORKSPACE/prince-of-space-vscode-${RELEASE_VERSION}.vsix"

      # Bundle the staging directory into a ZIP for Sonatype Central Portal upload.
      - name: Bundle staging artifacts
        run: |
          cd build/staging-deploy
          zip -r "$GITHUB_WORKSPACE/central-bundle.zip" .
          echo "Bundle size: $(du -sh "$GITHUB_WORKSPACE/central-bundle.zip" | cut -f1)"

      - name: Upload bundle to Sonatype Central Portal
        if: ${{ !inputs.dry_run }}
        id: upload
        run: |
          # Upload returns Content-Type text/plain with a raw deployment UUID, not JSON.
          # https://central.sonatype.org/publish/publish-portal-api/#uploading-a-deployment-bundle
          RESPONSE=$(curl --silent --show-error --fail --request POST \
            --header "Authorization: Bearer ${{ secrets.SONATYPE_CENTRAL_TOKEN }}" \
            --form "bundle=@$GITHUB_WORKSPACE/central-bundle.zip" \
            https://central.sonatype.com/api/v1/publisher/upload)
          echo "Response: $RESPONSE"
          RESPONSE_TRIMMED=$(echo "$RESPONSE" | tr -d '\r\n' | xargs)
          if [[ "${RESPONSE_TRIMMED:0:1}" == '{' ]]; then
            DEPLOYMENT_ID=$(echo "$RESPONSE_TRIMMED" | jq -r '.deploymentId // empty')
          else
            DEPLOYMENT_ID="$RESPONSE_TRIMMED"
          fi
          if [[ -z "$DEPLOYMENT_ID" ]]; then
            echo "::error::Upload failed — no deployment ID in response"
            exit 1
          fi
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "Deployment ID: $DEPLOYMENT_ID"

      # Central Portal validates checksums, signatures, and POM requirements.
      # Polls every 10 s for up to 3 minutes.
      - name: Wait for Central Portal validation
        if: ${{ !inputs.dry_run }}
        run: |
          DEPLOYMENT_ID="${{ steps.upload.outputs.deployment_id }}"
          SKIP_CENTRAL_PUBLISH=false
          for i in $(seq 1 18); do
            sleep 10
            STATUS_JSON=$(curl --silent --show-error --fail --request POST \
              --header "Authorization: Bearer ${{ secrets.SONATYPE_CENTRAL_TOKEN }}" \
              "https://central.sonatype.com/api/v1/publisher/status?id=$DEPLOYMENT_ID")
            STATUS=$(echo "$STATUS_JSON" | jq -r '.deploymentState // "UNKNOWN"')
            echo "[$i/18] Status: $STATUS"
            case "$STATUS" in
              VALIDATED) echo "Validation passed"; break ;;
              FAILED)
                echo "::error::Central Portal validation failed — full status:"
                echo "$STATUS_JSON" | jq .
                # Recovery case: previous run may have already published this exact version,
                # then failed in a later workflow step (e.g. packaging/tagging). In that case
                # Central rejects duplicates; continue without re-publishing.
                if echo "$STATUS_JSON" | jq -e '
                  [.errors[][]] as $errs
                  | ($errs | length > 0)
                  and ($errs | all(test("already exists")))
                ' >/dev/null; then
                  echo "::warning::All Central validation errors are duplicate coordinates (already exists)."
                  echo "::warning::Treating this as already-published and continuing release workflow."
                  SKIP_CENTRAL_PUBLISH=true
                  break
                fi
                exit 1
                ;;
            esac
          done
          echo "SKIP_CENTRAL_PUBLISH=${SKIP_CENTRAL_PUBLISH}" >> "$GITHUB_ENV"

      - name: Publish to Maven Central
        if: ${{ !inputs.dry_run && env.SKIP_CENTRAL_PUBLISH != 'true' }}
        run: |
          curl --silent --fail --request POST \
            --header "Authorization: Bearer ${{ secrets.SONATYPE_CENTRAL_TOKEN }}" \
            "https://central.sonatype.com/api/v1/publisher/deployment/${{ steps.upload.outputs.deployment_id }}"
          echo "Publication triggered — artifacts will appear on Maven Central within ~15 minutes."

      - name: Tag and push release
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists locally; skipping create."
          else
            git tag "${TAG}"
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin; skipping push."
          else
            git push origin "${TAG}"
          fi

      - name: Create GitHub Release (with downloadable assets)
        if: ${{ !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          NOTES_FILE="$GITHUB_WORKSPACE/build/release-notes.md"
          CLI_JAR="modules/cli/build/libs/prince-of-space-cli-${RELEASE_VERSION}.jar"
          IJ_ZIP="$(ls modules/intellij-plugin/build/distributions/*.zip | head -1)"
          VSIX="$GITHUB_WORKSPACE/prince-of-space-vscode-${RELEASE_VERSION}.vsix"
          for f in "$CLI_JAR" "$IJ_ZIP" "$VSIX"; do
            if [[ ! -f "$f" ]]; then echo "::error::Missing release asset: $f"; exit 1; fi
          done
          TAG="v${RELEASE_VERSION}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG} already exists; uploading assets with --clobber."
            gh release edit "${TAG}" --notes-file "$NOTES_FILE"
            gh release upload "${TAG}" \
              "$CLI_JAR" \
              "$IJ_ZIP" \
              "$VSIX" \
              --clobber
          else
            gh release create "${TAG}" \
              --notes-file "$NOTES_FILE" \
              --title "${TAG}" \
              "$CLI_JAR" \
              "$IJ_ZIP" \
              "$VSIX"
          fi

      # One chore commit per release: persist generated changelog updates and set the next
      # local SNAPSHOT line (e.g. 0.1.1-SNAPSHOT after shipping v0.1.0). Does not affect
      # CI version inference (tags + conventional commits).
      - name: Persist changelog and bump gradle.properties to next patch SNAPSHOT
        if: ${{ !inputs.dry_run }}
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IFS=. read -r major minor patch <<<"${RELEASE_VERSION}"
          NEXT_SNAPSHOT="${major}.${minor}.$((patch + 1))-SNAPSHOT"
          SNAPSHOT_ALREADY_SET=false
          if grep -q "^version=${NEXT_SNAPSHOT}$" gradle.properties; then
            SNAPSHOT_ALREADY_SET=true
          fi
          CHANGELOG_CHANGED=false
          if ! git diff --quiet -- CHANGELOG.md; then
            CHANGELOG_CHANGED=true
          fi
          if [[ "${SNAPSHOT_ALREADY_SET}" == "true" && "${CHANGELOG_CHANGED}" == "false" ]]; then
            echo "No changelog update and gradle.properties already at ${NEXT_SNAPSHOT}; skipping bump commit."
            exit 0
          fi
          if [[ "${SNAPSHOT_ALREADY_SET}" == "false" ]]; then
            sed -i 's/^version=.*/version='"${NEXT_SNAPSHOT}"'/' gradle.properties
          fi
          git add gradle.properties CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No staged changelog/snapshot changes; skipping bump commit."
            exit 0
          fi
          git commit -m "chore: update changelog and set version to ${NEXT_SNAPSHOT} after v${RELEASE_VERSION}"
          # Branch protection may forbid direct pushes to main. Do not fail the release if this
          # housekeeping commit cannot be pushed; the next run can still use Nyx + tags safely.
          if ! git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"; then
            echo "::warning::Could not push ${NEXT_SNAPSHOT} bump commit (likely branch protection)."
            echo "::warning::Create this commit via PR manually, or allow GitHub Actions to bypass protection."
          fi
