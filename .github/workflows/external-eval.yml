# External corpus checks: Spring Framework and Guava in parallel (matrix = one corpus per runner).
# Requires network to clone upstream; does not commit reports to the branch (artifacts only).
#
# Eval result dedupe: shared implementation in .github/actions/eval-external-corpus (upstream HEAD +
# github.sha). On cache hit, corpus checkout + Gradle eval are skipped.

name: External eval

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    # Weekly full matrix (all configs); adjust if too slow for default runners.
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: external-eval-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast gate: one config, same assertions as local eval (parse + idempotency).
  external-eval-smoke:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    name: External eval smoke (${{ matrix.corpus }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - corpus: spring-framework
            repository: spring-projects/spring-framework
          - corpus: guava
            repository: google/guava
    steps:
      - name: Checkout Prince of Space
        uses: actions/checkout@v6

      - name: Eval external corpus (smoke, cached)
        uses: ./.github/actions/eval-external-corpus
        with:
          corpus: ${{ matrix.corpus }}
          repository: ${{ matrix.repository }}
          cache_mode: smoke
          eval_max_heap: 5g
          eval_config_names: default-balanced

      - name: Upload eval report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-report-smoke-${{ matrix.corpus }}-${{ github.sha }}
          path: docs/eval-results/*.md
          if-no-files-found: ignore

  # Full matrix (all nine configs). Heavy: scheduled / manual only.
  external-eval-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: External eval full (${{ matrix.corpus }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - corpus: spring-framework
            repository: spring-projects/spring-framework
          - corpus: guava
            repository: google/guava
    steps:
      - name: Checkout Prince of Space
        uses: actions/checkout@v6

      - name: Eval external corpus (full matrix, cached)
        uses: ./.github/actions/eval-external-corpus
        with:
          corpus: ${{ matrix.corpus }}
          repository: ${{ matrix.repository }}
          cache_mode: full
          eval_max_heap: 6g

      - name: Upload eval report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-report-full-${{ matrix.corpus }}-${{ github.sha }}
          path: docs/eval-results/*.md
          if-no-files-found: ignore
