name: Pages

# Publishes examples/compare.html to GitHub Pages so users can browse it
# without cloning the repo. Enable Pages in repo Settings → Pages → Source:
# GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "examples/outputs/**"
      - "examples/compare.html"
      - "scripts/generate-compare.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Regenerate compare.html from committed outputs
        run: python3 scripts/generate-compare.py

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp examples/compare.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deploy
