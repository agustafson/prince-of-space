name: Pages

# Builds the MkDocs site (docs/) and publishes it to GitHub Pages.
# Also bundles examples/compare.html into the site root so the iframe on
# the Comparator page and direct links both work.
#
# Enable Pages in repo Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "examples/outputs/**"
      - "examples/compare.html"
      - "scripts/generate-compare.py"
      - "mkdocs.yml"
      - "ARCHITECTURE.md"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs and dependencies
        run: pip install -r docs/requirements.txt

      - name: Regenerate compare.html from committed outputs
        run: python3 scripts/generate-compare.py

      - name: Copy root-level docs into docs/ for MkDocs
        run: |
          cp ARCHITECTURE.md docs/architecture.md
          cp CONTRIBUTING.md docs/contributing.md
          cp CHANGELOG.md    docs/changelog.md

      - name: Build MkDocs site
        run: mkdocs build --strict --site-dir _site

      - name: Bundle compare.html into site root
        run: cp examples/compare.html _site/compare.html

      - name: Clean up copied root docs (keep working tree tidy)
        run: |
          rm -f docs/architecture.md docs/contributing.md docs/changelog.md

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deploy
