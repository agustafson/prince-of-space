name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin

      - uses: gradle/actions/setup-gradle@v6

      # CodeQL must see real compiler runs; Gradle build cache / incremental compile can skip
      # javac so the extractor sees no sources (finalize exit 32). See:
      # https://gh.io/troubleshooting-code-scanning/no-source-code-seen-during-build
      - name: Build
        run: ./gradlew --no-build-cache clean classes testClasses --no-daemon --no-configuration-cache

      - uses: github/codeql-action/analyze@v4
