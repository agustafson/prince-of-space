# Nyx release automation configuration.
# Reads conventional commits to infer the next semantic version.
# Tagging, publishing, and GitHub Release creation are handled by the release workflow.
# See RELEASING.md for the full release process.

# Use the built-in Conventional Commits convention.
# feat → minor bump, fix → patch bump, breaking (! or BREAKING CHANGE) → major bump.
commitMessageConventions:
  enabled:
    - conventionalCommits

releaseTypes:
  enabled:
    - mainline
  items:
    mainline:
      matchBranches: "^main$"
      # All git operations are performed by the release workflow, not Nyx.
      gitCommit: "false"
      gitTag: "false"
      gitPush: "false"
      publish: "false"

scheme: SEMVER
# Used only when there are no matching release tags in git (see RELEASING.md). After the first
# v* tag exists, Nyx bumps from that tag + conventional commits — not from this file or
# gradle.properties.
initialVersion: "0.1.0"
